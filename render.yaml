services:
  - type: web
    name: crm-appgom
    runtime: node
    plan: free
    buildCommand: "npm install && cd frontend && npm install && VITE_API_URL=/api npm run build"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: crm-appgom-db
          property: connectionString
      - key: ADMIN_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: crm-appgom-db
    plan: free
